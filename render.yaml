# StartupEvents — Render Deployment Configuration
# Syllabus: BE Unit VI — Deployment, CI/CD
#
# This deploys as a SINGLE web service:
#   - Builds the frontend (vite build)
#   - Serves built files + API from one Express server
#   - No CORS issues, Socket.IO works out of the box
#
# MongoDB: Use MongoDB Atlas (free tier) — Render does not offer MongoDB.
# Set MONGODB_URI in the Render dashboard Environment tab.

services:
  - type: web
    name: startupevents
    runtime: node
    region: oregon
    repo: https://github.com/enigmaAditya/startupEventApp
    buildCommand: |
      cd frontend && npm install && npm run build:prod && cd ../backend && npm install
    startCommand: node backend/src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false   # Set in Render dashboard (MongoDB Atlas connection string)
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: JWT_REFRESH_EXPIRE
        value: 30d
      - key: OPENAI_API_KEY
        sync: false   # Optional — set manually if you want AI features
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
